<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账号未开通 / 已到期</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 32px 16px;
      color: #1f2937;
    }
    .container { max-width: 520px; margin: 0 auto; }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 28px 24px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      margin-bottom: 20px;
    }
    .card h2 { margin: 0 0 10px; font-size: 20px; }
    .status-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 99px;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .badge-inactive { background: #f3f4f6; color: #6b7280; }
    .badge-expired  { background: #fee2e2; color: #991b1b; }
    .card p { margin: 0 0 12px; line-height: 1.65; color: #374151; font-size: 15px; }
    .user-info {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 16px;
    }
    .notice-box {
      margin-top: 4px;
      padding: 20px;
      background: #fafafa;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.75;
    }
    .notice-box h1, .notice-box h2, .notice-box h3 {
      font-size: 16px;
      margin-top: 16px;
      margin-bottom: 6px;
    }
    .notice-box img {
      max-width: 200px;
      display: block;
      margin: 10px 0;
    }
    .notice-box hr { border: none; border-top: 1px solid #e5e7eb; margin: 12px 0; }
    .btn-logout {
      display: inline-block;
      margin-top: 4px;
      padding: 10px 20px;
      background: #111827;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-logout:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="user-info">当前账号：{{ username }}（ID: {{ user_id }}）</div>
      <h2>无法进入系统</h2>

      {% if status == "未开通" %}
        <span class="status-badge badge-inactive">账号未开通</span>
        <p>您的账号尚未开通，请先完成充值后联系管理员开通。</p>
      {% else %}
        <span class="status-badge badge-expired">账号已到期</span>
        <p>您的账号已于 <strong>{{ expires_at }}</strong> 到期，请充值续费后联系管理员恢复使用。</p>
      {% endif %}

      <p>充值后请告知管理员您的用户 ID，等待开通/续费。</p>

      {% if notice_html %}
        <div class="notice-box">{{ notice_html | safe }}</div>
      {% endif %}

      <a href="/logout" class="btn-logout">退出登录</a>
    </div>
  </div>
</body>
</html>
