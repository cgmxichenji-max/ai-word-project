

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
  <div class="shell">
    <section class="panel" id="funPanel">
      <div class="mascot" id="mascot">
        <div class="blob"></div>
        <div class="face">
          <div class="eye-wrap left" id="eyeWrapLeft">
            <div class="lid"></div>
            <div class="eye" id="eyeLeft"></div>
          </div>
          <div class="eye-wrap right" id="eyeWrapRight">
            <div class="lid"></div>
            <div class="eye" id="eyeRight"></div>
          </div>
          <div class="cheek left"></div>
          <div class="cheek right"></div>
          <div class="mouth"></div>
        </div>
      </div>
      <div class="panel-title">
        <h2>欢迎回来</h2>
        <p>先把登录、单词池数量和密码流程跑通。<br>后面我们再把主页面和学习卡片做得更好玩。</p>
      </div>
    </section>

    <div class="box">
      <h1>{{ title }}</h1>
      <p class="desc">{{ desc }}</p>

      {% if message %}
        <div class="msg">{{ message }}</div>
      {% endif %}

      <form method="post" action="{{ action_url }}" id="mainForm">
        {% for field in fields %}
          <div class="field">
            <label for="{{ field.name }}">{{ field.label }}</label>
            <input
              id="{{ field.name }}"
              name="{{ field.name }}"
              type="{{ field.type }}"
              value="{{ field.value }}"
              {% if field.placeholder %}placeholder="{{ field.placeholder }}"{% endif %}
              {% if field.autofocus %}autofocus{% endif %}
              {% if field.required %}required{% endif %}
            >
          </div>
        {% endfor %}
        <div class="buttons">
          <button type="submit">{{ submit_text }}</button>
          {% if show_reset %}
            <a class="link-btn" href="{{ url_for('reset_login') }}">重来</a>
          {% endif %}
        </div>
      </form>

      {% if meta %}
        <div class="meta">{{ meta }}</div>
      {% endif %}
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
